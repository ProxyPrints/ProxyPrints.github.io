<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ProxyPrints — /editor left rail (delegacy round: nine grey drop-downs folded into designed elements)</title>
<style>
/* ============================================================================
   BINDING #302 THEME TOKENS — inherited VERBATIM from the corrected-bundle round
   (SPEC-display-left-rail-CORRECTED.md §0/§2), grounded in the shipped code, not
   approximated. Sources per token (extracted 2026-07-23, re-verified 2026-07-24):
     • bootswatch/dist/superhero/_variables.scss
     • frontend/src/styles/styles.scss  (#302 T2–T7 overrides)
     • frontend/src/features/display/DisplayPage.tsx  RailRoot styled-component
     • frontend/src/components/AutofillCollapse.tsx    Card.Header inline #4E5D6B
     • frontend/src/common/constants.ts                ToggleButtonHeight = 38
   THIS ROUND'S PREMISE (owner-approved 2026-07-24): every grey legacy
   AutofillCollapse drop-down is REMOVED from the rail; its contents fold into the
   designed elements below (or are SCRAPPED). Elements marked .propose are new/
   normalized this round and need the owner's knowing sign-off on the look.
   ============================================================================ */
:root{
  --body:#0f2537;          /* $body-bg (Superhero, kept by #302 T2)                  — page bg */
  --panel:#4e5d6c;         /* $secondary = $gray-600 = $card-bg                      — rail + card surface */
  --card-header:#4e5d6b;   /* AutofillCollapse Card.Header inline #4E5D6B (shipped)  */
  --raised:#22303f;        /* $dark / $input-bg (#302 T3/T4)                         — rail-head, inputs, panels */
  --conf:#2b3e50;          /* D14 confidence-band surface (shipped RailRoot .d14)    */
  --text:#ebebeb;          /* $gray-100 / $body-color (#302 T5)                      */
  --muted:#8fa0b0;         /* $input-placeholder-color (#302 T7)                     — muted / placeholder */
  --light:#abb6c2;         /* $light = lighten($gray-600,35%)                        — neutral outline btn */
  --primary:#df6919;       /* $primary = $orange (hover #be5915)                     — accent */
  --primary-hover:#be5915;
  --success:#5cb85c;       /* $success   */
  --danger:#d9534f;        /* $danger    */
  --warning:#ffc107;       /* $warning   */
  --info:#5bc0de;          /* $info      */
  --input-border:#4e5d6c;  /* $input-border-color (#302 T6)                          */
  --divider:#16202b;       /* normalized rail-block hairline (corrected-bundle O1, adopted) */
  --list-border:rgba(0,0,0,.22); /* shipped SourcesAccordion src-list border          */
  --radius:0;              /* $border-radius:0 — Superhero is FLAT */
  --radius-pill:10px;      /* D14 status pills — the shipped rounded exception       */
  --toggle-h:38px;         /* ToggleButtonHeight (constants.ts) */
  --toggle-w:54px;         /* shipped SourcesAccordion Toggle width */
  --annotate:#ffd76a;      /* mockup annotation ink (NOT a theme token) */
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#08161f;color:var(--text);
  font-family:Lato,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:16px;line-height:1.5}

/* ---------- demo strip (forces Desktop/Tablet/Phone at any window width) ---------- */
.demo{position:fixed;top:0;left:0;right:0;z-index:9000;display:flex;flex-wrap:wrap;
  align-items:center;gap:8px;padding:8px 12px;background:#000;border-bottom:2px solid var(--primary);font-size:12px}
.demo b{color:var(--primary);letter-spacing:.04em;text-transform:uppercase;font-size:11px}
.demo .grp{display:flex;gap:4px;align-items:center;padding:0 8px;border-right:1px solid #333}
.demo button{background:#22303f;color:var(--text);border:1px solid #46586a;padding:4px 9px;
  cursor:pointer;font-size:12px;font-family:inherit;border-radius:0}
.demo button.on{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:700}
.demo button:focus-visible{outline:2px solid var(--annotate);outline-offset:1px}
.demo .hint{color:var(--muted);font-size:11px;max-width:320px}

.stage{padding-top:56px;min-height:100vh}
.framewrap{overflow:hidden}
.frame{transform-origin:top left;background:var(--body);position:relative}
.frame-tag{position:absolute;top:6px;left:8px;z-index:50;color:var(--annotate);
  font-family:"Courier New",monospace;font-size:12px;background:rgba(0,0,0,.5);padding:1px 7px}

/* ============================ APP CHROME ============================ */
.appbar{display:flex;align-items:center;gap:12px;height:52px;padding:0 12px;
  background:var(--body);border-bottom:1px solid var(--divider);font-size:14px}
.appbar .deck{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.appbar .pill{margin-left:auto;background:rgba(0,0,0,.35);border:1px solid var(--divider);
  padding:2px 10px;font-variant-numeric:tabular-nums;font-size:12px}
.appbar .gear{width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  background:var(--panel);border:1px solid var(--divider);cursor:pointer}
.body-cols{display:flex;align-items:stretch;min-height:520px}

/* center sheet (three-region context only — out of scope) */
.center{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;gap:4px;
  position:relative;overflow:auto;background:var(--body)}
.npill{position:sticky;top:4px;align-self:flex-end;background:rgba(0,0,0,.5);
  border:1px solid var(--divider);border-radius:20px;padding:2px 10px;font-size:11px;
  font-variant-numeric:tabular-nums;pointer-events:none}
.sheet{width:100%;max-width:520px;aspect-ratio:279.4/215.9;border:1px solid rgba(235,235,235,.18);
  border-radius:7px;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);
  column-gap:2px;row-gap:10px;padding:6px}
.cell{aspect-ratio:63/88;background:repeating-linear-gradient(45deg,#33475a,#33475a 7px,#2b3c4d 7px,#2b3c4d 14px);
  outline:1px solid rgba(255,255,255,.06);position:relative}
.cell.sel{outline:2px solid var(--primary);outline-offset:-2px}
.cell .cn{position:absolute;top:2px;left:2px;font-size:8px;color:#9fb0c0;font-family:monospace}

/* right rail (three-region context only — out of scope) */
.rrail{width:300px;background:var(--panel);border-left:1px solid var(--divider);padding:10px;
  font-size:13px;flex:0 0 300px}
.rrail h6{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 6px}
.rrail .grp{background:var(--raised);border:1px solid var(--divider);padding:8px;margin-bottom:6px}
.rrail .muted{color:var(--muted);font-size:12px}
.rrail .foot{display:flex;gap:6px;margin-top:8px}

/* ============================ LEFT RAIL (this round) ============================ */
.lrail{width:380px;flex:0 0 380px;background:var(--panel);border-right:1px solid var(--divider);
  display:flex;flex-direction:column;overflow:hidden}
/* Inside a tablet start-drawer / phone bottom-sheet the rail must FILL the drawer (column flow) and
   let .lscroll own the scroll — otherwise `flex:0 0 380px` sets a 380px HEIGHT and the sheet can't
   reach the bottom control stack. In the desktop row layout the 380px width above still governs. */
.drawer .lrail{flex:1 1 auto;width:100%;min-height:0;border-right:none}
.lscroll{overflow-y:auto;display:flex;flex-direction:column;min-height:0}
.drawer .lscroll{flex:1 1 auto}
/* DENSITY (§2, inherited): sections BUTT together, separated by one 1px hairline — never a gap. */

/* ---- (1) RAIL HEAD: LEAN identity + subject-card image (revision 2026-07-24) — bg #22303f, pad 8px 10px ----
   Revision rules: (#1) ALL Card-Details metadata lives in the "More details" disclosure, NOT as
   rows under the name — rail-head stays lean. (#3 NEW) the rail's TOP shows the SUBJECT card image
   (thumbnail of the slot's currently-selected art) with an empty state. (#2) the printing identifier
   appears ONCE, canonically in the D14 band — removed from here. */
.rhead{background:var(--raised);padding:8px 10px;border-bottom:1px solid var(--divider)}
.rhead-row{display:flex;gap:10px;align-items:flex-start}
/* #3 subject-card thumbnail — a PREVIEW (not a second full render; Select Version stays the art surface).
   66px wide keeps it recognisable without starving the 390px grid below. INTRODUCED. */
.subject{flex:0 0 66px;width:66px;aspect-ratio:63/88;position:relative;overflow:hidden;
  border:1px solid rgba(235,235,235,.15);
  background:repeating-linear-gradient(45deg,#33475a,#33475a 7px,#2b3c4d 7px,#2b3c4d 14px)}
.subject .sjcap{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);
  font-size:7px;text-align:center;color:#cdd6df;padding:1px;font-family:monospace}
.subject.empty{background:transparent;border:1px dashed var(--light);display:flex;
  align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:9px;padding:4px;line-height:1.3}
body[data-subject="empty"] .subject.art{display:none}
body[data-subject="art"] .subject.empty{display:none}
.idcol{flex:1;min-width:0}
.rhead .slot{font-weight:700;font-size:14px}
.rhead .slot .face{font-weight:400;color:var(--muted);font-size:11px;text-transform:uppercase;margin-left:6px}
.rhead .name{font-size:15px;margin-top:1px}
body[data-subject="empty"] .rhead .name.real{display:none}
.rhead .name.none{display:none;color:var(--muted);font-style:italic}
body[data-subject="empty"] .rhead .name.none{display:block}
/* requested≠resolved MISMATCH flag only (not a static printing-id copy) — see D14 for the canonical id */
.rhead .mismatch{display:inline-block;margin-top:5px;background:var(--warning);color:#111;
  padding:1px 7px;font-family:monospace;font-size:10px;border-radius:0}
body[data-subject="empty"] .rhead .mismatch{display:none} /* no requested/shown compare with no art */
/* "More details" disclosure — now the SOLE home of the Card-Details metadata block (#1) */
.detmore{margin-top:6px;background:transparent;border:none;color:var(--muted);font-size:11px;
  cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:4px;font-family:inherit}
.detmore:hover{color:var(--text)}
.detmore .chev{transition:transform .2s;font-size:10px}
body[data-details="open"] .detmore .chev{transform:rotate(90deg)}
.detbody{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--divider)}
body[data-details="open"] .detbody{display:block}
.mrow{display:flex;gap:8px;font-size:11px;line-height:1.6}
.mrow .mk{color:var(--muted);flex:0 0 88px;text-transform:uppercase;letter-spacing:.03em;font-size:10px}
.mrow .mv{color:var(--text)}
.mrow .mv.mono{font-family:monospace}
.detbody .copy{color:var(--info);cursor:pointer;text-decoration:underline dotted}
.detbody .dtags{display:inline-flex;flex-wrap:wrap;gap:3px}
.detbody .dtag{background:var(--panel);color:var(--text);border-radius:10px;padding:0 6px;font-size:9px}
.detbody .dacts{display:flex;gap:6px;margin-top:8px}

/* ---- (2) D14 CONFIDENCE ELEMENT — locked (corrected-bundle §C, decisions #271 + owner #2) ---- */
.d14{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:0;
  padding:8px 10px;background:var(--conf);border-bottom:1px solid var(--divider);font-size:12px}
.seticon{position:relative;width:30px;height:30px;flex:0 0 30px;display:inline-flex;
  align-items:center;justify-content:center;background:var(--panel);border:1px solid #7f8fa0;
  border-radius:50%;cursor:pointer}
.seticon svg{width:17px;height:17px;fill:var(--text)}
.seticon:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
.seticon .check{position:absolute;right:-3px;bottom:-3px;width:15px;height:15px;background:var(--success);
  color:#fff;border:2px solid var(--conf);border-radius:50%;display:none;align-items:center;
  justify-content:center;font-size:9px;font-weight:900}
.seticon .score{position:absolute;right:-7px;bottom:-7px;background:var(--primary);color:#fff;
  border:2px solid var(--conf);border-radius:10px;font-size:9px;font-weight:800;padding:1px 4px;
  display:none;line-height:1;font-variant-numeric:tabular-nums}
.d14 .idtext{font-size:12px;font-family:monospace}
.d14 .statepill{padding:1px 8px;border:1px solid var(--panel);border-radius:var(--radius-pill);font-size:11px;font-weight:700}
.d14 .statepill.confirmed{border-color:#3f7a2f;color:#a7e08a}
.d14 .statepill.suggested{border-color:var(--primary);color:#ffb27d}
.d14 .notthis{margin-left:auto}
body[data-conf="confirmed"] .seticon .check{display:flex}
body[data-conf="confirmed"] .statepill.suggested{display:none}
/* locked owner answer #2: ✗ stays on a confirmed printing, de-emphasised (opacity .6), NOT hidden */
body[data-conf="confirmed"] .d14 .notthis{opacity:.6}
body[data-conf="suggested"] .seticon .score{display:block}
body[data-conf="suggested"] .statepill.confirmed{display:none}
/* Scryfall hover popover (real: OverlayTrigger+Popover, Scryfall CDN, nothing stored) */
.seticon .pop{position:absolute;left:36px;top:-6px;z-index:60;width:150px;background:#0b1520;
  border:1px solid #7f8fa0;padding:6px;display:none;box-shadow:0 6px 18px rgba(0,0,0,.5)}
.seticon:hover .pop,.seticon:focus-within .pop{display:block}
.pop .img{aspect-ratio:63/88;background:repeating-linear-gradient(45deg,#2a3a49,#2a3a49 8px,#22303f 8px,#22303f 16px);
  border:1px solid rgba(235,235,235,.15);display:flex;align-items:center;justify-content:center;text-align:center;
  font-size:9px;color:var(--muted);padding:4px}
.pop .cap{font-size:9px;color:var(--muted);margin-top:4px;line-height:1.3}

/* item 6: Printing-Tags voting surface HANGS OFF D14 (same subject: what is this printing) */
.idhang{background:var(--conf);border-bottom:1px solid var(--divider);padding:0 10px 8px}
.idtoggle{background:transparent;border:1px solid #6b7d8e;color:var(--light);font-size:12px;
  padding:3px 8px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.idtoggle:hover{border-color:var(--light);color:var(--text)}
.idtoggle .chev{transition:transform .2s;font-size:10px}
body[data-idpanel="open"] .idtoggle .chev{transform:rotate(90deg)}
.idbody{display:none;margin-top:8px;background:var(--raised);border:1px solid var(--divider);padding:8px}
body[data-idpanel="open"] .idbody{display:block}
.idbody .cons{font-size:11px;color:var(--muted);margin-bottom:6px}
.idbody .cons b{color:var(--text)}
.idbody .idsearch{display:block;width:100%;background:var(--conf);color:var(--text);
  border:1px solid var(--input-border);padding:5px 8px;font-size:12px;margin-bottom:8px;border-radius:0}
.idbody .idsearch::placeholder{color:var(--muted)}
.candgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.cand{aspect-ratio:63/88;border:1px solid #6b7d8e;background:repeating-linear-gradient(45deg,#33475a,#33475a 7px,#2b3c4d 7px,#2b3c4d 14px);
  position:relative;cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding:2px}
.cand.nomatch{background:#1b2836;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:9px}
.cand.sel{border:2px solid var(--success)}
.cand .cl{background:rgba(0,0,0,.65);font-size:7px;font-family:monospace;padding:0 2px;width:100%;text-align:center}
.idbody .attrfollow{margin-top:8px;padding-top:8px;border-top:1px solid var(--divider);font-size:11px;color:var(--muted)}

/* ---- (3) ARTIST support — shipped .artist-line bg #22303f, pad 8px 10px ---- */
.artist{background:var(--raised);padding:8px 10px;border-bottom:1px solid var(--divider)}
.artist .by{font-size:13px;margin-bottom:6px}
.artist .by .nm{color:var(--text);font-weight:600}

/* ---- (4) SOURCES — inherited inline design (owner answer #3); NOT one of the nine removed ---- */
.sources{border-bottom:1px solid var(--divider)}
.src-summary{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;
  background:var(--card-header);user-select:none}
.src-summary:focus-visible{outline:2px solid var(--primary);outline-offset:-2px}
.src-summary .lbl{font-size:12px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.src-summary .count{font-variant-numeric:tabular-nums;font-size:12px}
.src-summary .count b{color:var(--success)}
.src-summary .chev{margin-left:auto;transition:transform .2s;font-size:12px}
.sources.open .src-summary .chev{transform:rotate(90deg)}
.src-pins{display:flex;flex-wrap:wrap;gap:4px;padding:0 10px 7px;background:var(--card-header)}
.pinchip{font-size:11px;background:var(--raised);border:1px solid rgba(0,0,0,.22);padding:1px 7px;
  display:inline-flex;gap:3px;align-items:center}
.pinchip .star{color:var(--warning)}
.src-body{padding:8px 10px;display:none;background:var(--panel)}
.sources.open .src-body{display:block}
.src-body .filter{display:block;width:100%;background:var(--raised);color:var(--text);
  border:1px solid var(--input-border);padding:6px 10px;font-size:14px;margin-bottom:8px;border-radius:0}
.src-body .filter::placeholder{color:var(--muted)}
.src-bulk{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.src-defaults{margin-bottom:8px}
.src-list{max-height:150px;overflow-y:auto;border:1px solid var(--list-border);background:var(--raised)}
.src-row{display:flex;align-items:center;gap:8px;padding:8px;border-bottom:1px solid rgba(0,0,0,.22)}
.src-row:last-child{border-bottom:none}
.tgl{flex:0 0 var(--toggle-w);width:var(--toggle-w);height:var(--toggle-h);border:1px solid #6b7d8e;
  display:inline-flex;font-size:11px;font-weight:700;cursor:pointer;user-select:none}
.tgl span{flex:1;display:flex;align-items:center;justify-content:center}
.tgl .on{background:var(--primary);color:#fff}
.tgl .off{background:var(--panel);color:var(--muted)}
.tgl[data-on="false"] .on{background:var(--panel);color:var(--muted)}
.tgl[data-on="false"] .off{background:#3a4653;color:var(--text)}
.tgl[data-on="true"] .off{background:var(--panel);color:var(--muted)}
.src-row .snm{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.src-row .pin{background:transparent;border:none;color:#5b6b7b;cursor:pointer;font-size:16px;
  min-width:var(--toggle-h);min-height:var(--toggle-h);display:inline-flex;align-items:center;justify-content:center}
.src-row .pin.on{color:var(--warning)}
.src-row .pin:focus-visible{outline:2px solid var(--primary);outline-offset:-2px}

/* ---- (5) SELECT VERSION — promoted, always open ---- */
.sv{padding:8px 10px;border-bottom:1px solid var(--divider)}
.sv h6.svtitle{margin:0;padding:8px 0 4px;font-weight:600;font-size:14px}
/* item 2: header row = [N versions] [Sort ▾] [Filters ▾] */
.svhead{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.svhead .n{color:var(--text);font-weight:700}
.svhead .grow{flex:1 1 auto}
/* compact Sort dropdown (react-bootstrap Form.Select size=sm) — INTRODUCED */
.sortsel{background:var(--raised);color:var(--text);border:1px solid var(--input-border);
  font-size:12px;padding:3px 6px;border-radius:0;font-family:inherit;max-width:150px}
/* seg (inherited) */
.seg{display:inline-flex;border:1px solid var(--input-border)}
.seg button{background:var(--raised);color:var(--text);border:none;border-right:1px solid var(--input-border);
  padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--primary);color:#fff;font-weight:700}
.seg button:focus-visible{outline:2px solid var(--primary);outline-offset:-1px}
/* tile grid (inherited PR#352 densities 72/88/112) */
.vgrid{display:flex;flex-wrap:wrap;gap:6px}
.vtile{width:72px;aspect-ratio:63/88;background:repeating-linear-gradient(45deg,#33475a,#33475a 7px,#2b3c4d 7px,#2b3c4d 14px);
  outline:1px solid rgba(235,235,235,.15);position:relative}
.vtile.med{width:88px}.vtile.hero{width:112px}
.vtile.sel{outline:2px solid var(--primary)}
.vtile .vl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);font-size:8px;
  text-align:center;padding:1px;font-family:monospace}
.vtile .corner{position:absolute;top:0;left:0;font-size:7px;font-weight:800;letter-spacing:.03em;
  padding:0 3px;color:#fff;text-transform:uppercase}
.vtile .corner.canon{background:rgba(92,184,92,.92)}
.vtile .corner.alt{background:rgba(91,192,222,.92)}
.vtile .corner.unk{background:rgba(120,135,150,.92)}
.vtile .req{position:absolute;top:0;right:0;background:var(--primary);color:#fff;font-size:8px;padding:0 3px;font-weight:800}
.vtile .confirm{position:absolute;top:0;right:0;width:0;height:0;border-top:16px solid var(--warning);
  border-left:16px solid transparent;cursor:pointer}
.vtile .confirm i{position:absolute;top:-15px;right:1px;color:#111;font-size:8px;font-weight:900;font-style:normal}
.vtile.ghost{background:transparent;outline:1px dashed var(--light);display:flex;align-items:center;
  justify-content:center;color:var(--light);font-size:11px;cursor:pointer}

/* item 3 + 5: FILTERS PANEL — one Collapse holding all filter fieldsets, flat, NO grey inner headings */
.filtersbtn{background:transparent;border:1px solid var(--light);color:var(--light);font-size:14px;
  padding:4px 8px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.filtersbtn:hover{background:var(--light);color:#111}
.filtersbtn .chev{transition:transform .2s;font-size:10px}
body[data-fpanel="open"] .filtersbtn .chev{transform:rotate(180deg)}
.fpanel{background:var(--raised);border:1px solid var(--divider);padding:8px}
/* O3 (ruled 2026-07-24): PHONE = in-rail expand IN PLACE (no overlay-over-overlay in the sheet).
   DESKTOP inline rail + TABLET drawer = a panel that FLOATS toward the CENTRE of the viewport
   (more room, no stacking hazard there). Two nodes, one shared body: the inline one lives in the
   rail (phone only); the float one is a child of the tier .frame (desktop/tablet only), so it
   escapes the 380px column and the drawer's own clipping and centres on the frame. */
.fpanel.inline{display:none;margin-bottom:8px}
.fpanel.float{display:none;position:absolute;left:50%;top:64px;transform:translateX(-50%);
  width:440px;max-width:calc(100% - 32px);max-height:calc(100% - 96px);overflow-y:auto;z-index:91;
  border:1px solid #7f8fa0;box-shadow:0 12px 34px rgba(0,0,0,.6);padding:0}
.fpanel.float .fpwrap{padding:12px}
.fscrim{display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:90}
/* tier-gated visibility (data-tier on the .frame, data-fpanel on <body>) */
body[data-fpanel="open"] .frame[data-tier="phone"] .fpanel.inline{display:block}
body[data-fpanel="open"] .frame[data-tier="desktop"] .fpanel.float,
body[data-fpanel="open"] .frame[data-tier="tablet"] .fpanel.float{display:block}
body[data-fpanel="open"] .frame[data-tier="desktop"] .fscrim,
body[data-fpanel="open"] .frame[data-tier="tablet"] .fscrim{display:block}
.fpanel.float .fptitle{display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:var(--card-header);font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;position:sticky;top:0}
.fpanel.float .fptitle button{background:transparent;border:1px solid rgba(235,235,235,.2);color:var(--text);
  padding:2px 8px;cursor:pointer;font-family:inherit;font-size:12px}
.fset{border:none;margin:0 0 9px;padding:0}
.fset:last-child{margin-bottom:0}
.fset > .lg{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:4px}
.fset .lg .propose{margin-left:5px}
.fset .frow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fset .frow + .frow{margin-top:5px}
.fset .frl{font-size:10px;text-transform:uppercase;color:var(--muted);flex:0 0 46px}
/* tri-state FILTER chips (attributeChips.nextChipState cycle: · neutral → + include → − exclude) */
.tchip{font-size:11px;padding:2px 7px;border:1px solid #6b7d8e;background:transparent;color:var(--text);
  cursor:pointer;display:inline-flex;gap:3px;align-items:center;font-family:inherit}
.tchip:focus-visible{outline:2px solid var(--primary);outline-offset:1px}
.tchip .st{font-weight:900;font-size:10px}
.tchip[data-s="inc"]{border-color:var(--success);background:rgba(92,184,92,.22);color:#bfe6ad}
.tchip[data-s="exc"]{border-color:var(--danger);background:rgba(217,83,79,.22);color:#f0b3b1;text-decoration:line-through}
.tchip[data-s="neutral"] .st{color:var(--muted)}
/* SUGGESTED chip state (ratified funnel F3): a chip carried only via suggestedFilterTagNames —
   dashed border + trailing ⌇ glyph, exactly as grid-selector.md's funnel spec. NOT a new mechanic. */
.tchip.suggested{border-style:dashed;border-color:var(--light)}
.tchip .sg{margin-left:2px;color:var(--light);font-weight:700}
.seg button.suggested{border-style:dashed}
/* implicit-vote awareness line (ratified funnel column element) — sits under the chips */
.implicit-note{font-size:10px;color:var(--muted);margin-top:7px;display:flex;gap:5px;align-items:flex-start;line-height:1.4}
.implicit-note .ic{color:var(--info);flex:0 0 auto}
/* fieldset separator inside the filter panel */
.fsep{height:1px;background:var(--divider);margin:9px -8px}
/* themed range (DPIFilter / SizeFilter) placeholder */
.frange{display:flex;align-items:center;gap:8px;width:100%}
.ftrack{flex:1;height:4px;background:#3a4653;position:relative;border-radius:2px}
.ftrack .fill{position:absolute;left:20%;right:22%;top:0;bottom:0;background:var(--primary);border-radius:2px}
.ftrack .knob{position:absolute;top:50%;width:12px;height:12px;background:var(--light);border:1px solid #fff;
  border-radius:50%;transform:translate(-50%,-50%)}
.frange .fval{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;flex:0 0 auto}
/* themed tree-select box (LanguageFilter / TagFilter) placeholder */
.ftree{display:flex;align-items:center;gap:6px;width:100%;background:var(--conf);border:1px solid var(--input-border);
  padding:4px 8px;font-size:11px;color:var(--muted);cursor:pointer}
.ftree .fchips{display:inline-flex;gap:3px;flex-wrap:wrap}
.ftree .fchips .c{background:var(--panel);color:var(--text);padding:0 6px;border-radius:10px;font-size:9px}
.ftree .fcar{margin-left:auto;color:var(--muted)}
/* NSFW switch (MatureContentFilter) — themed Form.Check switch */
.fswitch{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text)}
.swtrack{width:34px;height:18px;background:#3a4653;border-radius:10px;position:relative;cursor:pointer;flex:0 0 34px}
.swtrack .swknob{position:absolute;top:2px;left:2px;width:14px;height:14px;background:var(--light);border-radius:50%;transition:.15s}
.swtrack[data-on="true"]{background:var(--primary)}
.swtrack[data-on="true"] .swknob{left:18px;background:#fff}

/* ---- (7) ONE designed CONTROL STACK at rail bottom: Print Options + Slot Actions + Report ---- */
.cstack{padding:8px 10px}
.cs-group{margin-bottom:10px}
.cs-legend{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px}

  font-size:13px;padding:4px 8px;border-radius:0;font-family:inherit}

.slotacts{display:flex;flex-direction:column;gap:6px}
.cs-foot{border-top:1px solid var(--divider);padding-top:8px}

/* buttons — real Superhero .btn (FLAT, radius 0); btn-sm = Bootstrap 14px / 4px 8px (inherited N) */

/* removed-sections ledger strip (mockup meta, top of rail) */

@media (prefers-reduced-motion: reduce){*{transition:none !important}}

function filterFieldsets(){

    <!-- (5) SELECT VERSION — promoted, always open -->
    <div class="sv">
      <h6 class="svtitle">Select Version</h6>

      <div class="svhead">

      <!-- ONE CONTINUOUS GRID (inherited §F): corner tags, ghost "+N", suggested-confirm ribbon -->
      <div class="vgrid" role="list">
        <span class="vtile sel" role="listitem" aria-label="requested printing 2X2 117"><span class="req">REQ</span><span class="vl">2X2·117</span></span>
        <span class="vtile" role="listitem" aria-label="canonical printing LEA 161"><span class="corner canon">✓</span><span class="vl">LEA·161</span></span>

    <div class="cstack">

      <div class="cs-foot">

/* small inline set glyph for the metadata row (represents SetIcon.tsx keyrune) */
function setGlyph2(){
  return '<svg class="ss" width="11" height="11" viewBox="0 0 24 24" style="vertical-align:-1px" aria-hidden="true"><path fill="#8fa0b0" d="M12 2l3 6 6 .9-4.5 4.3 1 6.3L12 16.9 6.5 19.5l1-6.3L3 8.9 9 8z"/></svg>';
}

/* center + right rail (three-region context) */
function center(){
  let cells='';
  for(let i=1;i<=8;i++) cells+=`<span class="cell${i===3?' sel':''}"><span class="cn">${i}</span></span>`;
  let sheets='';
  for(let s=0;s<3;s++) sheets+=`<div class="sheet">${cells}</div>`;
  return `<div class="center"><span class="npill">1 / 6</span>${sheets}</div>`;
}
function rightRail(){
  return `<div class="rrail">
    <h6>Print &amp; Settings</h6>
    <div class="grp"><b style="font-size:12px">Page Setup</b><div class="muted">Letter · borderless · bleed 3.175mm</div></div>
    <div class="grp"><b style="font-size:12px">Finish · Cardback · Colour</b><div class="muted">collapsed</div></div>
    <div class="foot">
      <button class="btn btn-primary" style="flex:1">Save Deck</button>
      <button class="btn btn-primary" style="flex:1">Print / Export →</button>
    </div>
    <div class="note" style="margin-top:6px">Right rail shown for three-region context only — not this round's scope.</div>
  </div>`;
}

/* ------------------------------------------------------------------ frame assembly */
/* O3 desktop/tablet: the Filters panel FLOATS toward the viewport centre — a frame-level node
   (escapes the 380px rail column and, on tablet, the drawer's clipping). Shares filterFieldsets(). */
function floatPanel(){
  return `<div class="fscrim" onclick="closeFilters()"></div>
    <div class="fpanel float" role="group" aria-label="Version filters">
      <div class="fptitle"><span>Filters — refine versions</span><button onclick="closeFilters()">Close ✕</button></div>
      <div class="fpwrap">${filterFieldsets()}</div>
    </div>`;
}
function desktopFrame(){
  return `<div class="appbar"><span class="deck">Modern Burn</span>
      <span class="pill">Sheet 1 / 6</span></div>
    <div class="body-cols">${leftRail()}${center()}${rightRail()}</div>
    ${floatPanel()}`;
}
function tabletFrame(){
  return `<div class="appbar"><span class="deck">Modern Burn</span>
      <span class="pill">Sheet 1 / 6</span><span class="gear">⚙</span></div>
    <div class="body-cols">${center()}</div>
    <div class="scrim"></div>
    <div class="drawer start">
      <div class="drawer-hd"><span style="font-weight:700">Card details</span><button>Close ✕</button></div>
      ${leftRail()}
    </div>
    ${floatPanel()}`;
}
function phoneFrame(){
  return `<div class="appbar"><span class="deck">Modern Burn</span>
      <span class="pill">1 / 6</span><span class="gear">⚙</span></div>
    <div class="body-cols">${center()}</div>
    <div class="scrim"></div>
    <div class="drawer bottom">
      <div class="drawer-grip"></div>
      <div class="drawer-hd"><span style="font-weight:700">Slot 3 · Front</span><button>Close ✕</button></div>
      ${leftRail()}
    </div>`;
}

const W={desktop:1400,tablet:900,phone:390};
const H={desktop:860,tablet:900,phone:820};

function syncDemoOffset(){
  const demo=document.querySelector('.demo');
  document.getElementById('stage').style.paddingTop=(demo.offsetHeight+8)+'px';
}
function render(){
  const view=document.body.getAttribute('data-view')||'auto';
  const stage=document.getElementById('stage');
  const avail=window.innerWidth;
  syncDemoOffset();

  function scaledFrame(tier,html){
    const fw=W[tier], fh=H[tier];
    const scale=Math.min(1, (avail-24)/fw);
    return `<div class="framewrap" style="height:${Math.ceil(fh*scale)+18}px">
      <div class="frame" data-tier="${tier}" style="width:${fw}px;height:${fh}px;transform:scale(${scale})">
        <span class="frame-tag">${tier.toUpperCase()} — ${fw}px, scaled ${(scale*100).toFixed(0)}%</span>
        ${html}
      </div></div>`;
  }
  const build={desktop:desktopFrame,tablet:tabletFrame,phone:phoneFrame};

  if(view==='auto'){
    let tier = avail>=1200?'desktop':avail>=768?'tablet':'phone';
    stage.innerHTML=`<div class="frame" data-tier="${tier}" style="width:100%;position:relative">
      <span class="frame-tag">AUTO — ${avail}px → ${tier}</span>${build[tier]()}</div>`;
  }else{
    stage.innerHTML=scaledFrame(view,build[view]());
  }
  fillSources();
}

/* source list rows */
const SRC=[["Chilli's Cube",true,true],['MPCFill Community',true,true],['Nexus Proxies',true,false],
  ['GoodGamery Scans',true,false],['Old School 93/94',false,false],['Retro Frame Vault',true,false],
  ['Alt Art Collective',true,false],['Silver Border Depot',false,false],['Judge Foils Archive',true,false],
  ['Textless Originals',false,false]];
function srcRows(){
  return SRC.map(([n,on,pin])=>`<div class="src-row">
    <span class="tgl" data-on="${on}" role="switch" aria-checked="${on}" tabindex="0" aria-label="${n}"
          onclick="this.setAttribute('data-on', this.getAttribute('data-on')==='true'?'false':'true')">
      <span class="on">On</span><span class="off">Off</span></span>
    <span class="snm">${n}</span>
    <button class="pin${pin?' on':''}" aria-pressed="${pin}" aria-label="Pin ${n} as a favourite source">★</button>
  </div>`).join('');
}
function fillSources(){
  document.querySelectorAll('.src-list').forEach(el=>{el.innerHTML=srcRows();});
}

/* demo strip wiring */
document.querySelector('.demo').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  ['view','conf','fpanel','idpanel','report','subject','details'].forEach(k=>{
    if(b.dataset[k]!==undefined){
      document.body.setAttribute('data-'+k,b.dataset[k]);
      b.parentNode.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
      if(k==='view')render();
    }
  });
});
window.addEventListener('resize',()=>{clearTimeout(window._t);window._t=setTimeout(render,120);});
render();
window.addEventListener('load',syncDemoOffset);
</script>
