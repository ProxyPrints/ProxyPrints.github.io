name: Upstream drift monitor

# Weekly rot detector for the upstream-feat-*/upstream-fix-* branches:
# does each branch still apply cleanly onto upstream/master's CURRENT
# tip, and how far has upstream moved past the branch's own fork point?
# This workflow only DETECTS and REPORTS - it never rebases, merges, or
# otherwise mutates any branch. Per the entrypoint/migrate composition
# lesson (docs/troubleshooting.md's "Entrypoint + migrate composition
# traps"): steps that look separable can already be silently fused if
# you let automation chain them. Detection (this workflow) and
# remediation (a human or a worker session deciding to rebase a branch)
# stay two genuinely separate, manually-composed steps - see
# conventions.md.
on:
  schedule:
    - cron: "0 8 * * 1" # Monday 08:00 UTC, weekly (1h after branch verification)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/chilli-axe/mpc-autofill.git

      - name: Fetch upstream and candidate branches
        run: |
          git fetch upstream master
          git ls-remote --heads origin 'upstream-feat-*' 'upstream-fix-*' | sed 's#.*refs/heads/##' > /tmp/branches.txt
          while read -r b; do git fetch origin "$b:refs/remotes/origin/$b" 2>/dev/null || true; done < /tmp/branches.txt

      - name: Compute drift per branch
        id: drift
        run: |
          {
            echo "# Upstream drift log"
            echo
            echo "Auto-generated by \`.github/workflows/upstream-drift-monitor.yml\`"
            echo "— edited in place on every run, never a dated changelog. Detects"
            echo "rot only; a human or worker session decides whether/when to"
            echo "rebase a branch onto the new upstream tip (see"
            echo "\`conventions.md\`'s automation-composition note — this workflow"
            echo "never rebases anything itself)."
            echo
            echo "Last run: $(date -u +"%Y-%m-%d %H:%M UTC"), upstream/master @ $(git rev-parse upstream/master)"
            echo
            echo "| Branch | Applies clean onto upstream/master? | Upstream commits since fork point | Files upstream touched that this branch also touches | Last checked |"
            echo "| --- | --- | --- | --- | --- |"

            if [ ! -s /tmp/branches.txt ]; then
              echo "| _(none found)_ | | | | $(date -u +%Y-%m-%d) |"
            fi

            while read -r BRANCH; do
              [ -z "$BRANCH" ] && continue
              REF="refs/remotes/origin/$BRANCH"
              if ! git rev-parse --verify "$REF" >/dev/null 2>&1; then
                echo "| \`$BRANCH\` | _(fetch failed)_ | | | $(date -u +%Y-%m-%d) |"
                continue
              fi

              MERGE_BASE=$(git merge-base upstream/master "$REF" 2>/dev/null || echo "")
              if [ -z "$MERGE_BASE" ]; then
                echo "| \`$BRANCH\` | _(no merge-base found)_ | | | $(date -u +%Y-%m-%d) |"
                continue
              fi

              if git merge-tree --write-tree "$REF" upstream/master >/tmp/mt-out.txt 2>&1; then
                CLEAN="yes"
              else
                CLEAN="**no** — conflicts"
              fi

              COMMITS_SINCE=$(git rev-list --count "$MERGE_BASE..upstream/master")

              CHANGED_FILES=$(git diff --name-only "$MERGE_BASE" "$REF")
              TOUCHING=0
              if [ -n "$CHANGED_FILES" ] && [ "$COMMITS_SINCE" -gt 0 ]; then
                TOUCHING=$(git log --name-only --format="" "$MERGE_BASE..upstream/master" -- $CHANGED_FILES | sort -u | grep -c . || true)
              fi

              echo "| \`$BRANCH\` | $CLEAN | $COMMITS_SINCE | $TOUCHING file(s) | $(date -u +%Y-%m-%d) |"
            done < /tmp/branches.txt
          } > docs/upstreaming/drift-log.md

      - name: Commit drift log to master
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/upstreaming/drift-log.md; then
            echo "No drift-log changes this run."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add docs/upstreaming/drift-log.md
            git commit -m "Upstream drift log: weekly refresh"
            git push origin HEAD:master
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Relay a short status note
        if: always()
        run: |
          if [ "${{ steps.commit.outputs.changed }}" = "true" ]; then
            CHANGED="drift-log.md updated and pushed to master."
          else
            CHANGED="drift-log.md unchanged this run (table already matched current state)."
          fi
          {
            echo '```'
            echo "TASK: Upstream drift monitor (automated) — weekly run ${{ github.run_id }}"
            echo "WHAT SHIPPED: docs/upstreaming/drift-log.md checked against"
            echo "  upstream/master @ $(git rev-parse upstream/master). $CHANGED"
            echo "VERIFICATION: no-commit trial merge (git merge-tree) per branch;"
            echo "  no branch was rebased, merged, or otherwise modified by this run."
            echo "LIVE STATE: see docs/upstreaming/drift-log.md on master for the"
            echo "  full current table — this note is a pointer, not a duplicate."
            echo '```'
          } > /tmp/relay-note.md
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4; do
            rm -rf /tmp/relay
            git clone --branch report-relay --depth 50 \
              "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" /tmp/relay
            mkdir -p /tmp/relay/docs/reports
            cp /tmp/relay-note.md "/tmp/relay/docs/reports/$(date -u +%Y-%m-%d)-upstream-drift-monitor.md"
            (cd /tmp/relay && git add docs/reports && \
              git commit -m "Drift monitor relay note (run ${{ github.run_id }})" && \
              git push origin HEAD:report-relay) && break
            sleep $((attempt * 5))
          done
