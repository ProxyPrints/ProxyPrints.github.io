name: Worker agent model lint

# Fails if any .claude/agents/worker-*.md is missing `model: sonnet` in
# its YAML frontmatter (issue #180). That line is what pins a spawned
# worker to the mid-tier model — nothing else enforces it, so a silently
# dropped line would make a worker inherit the parent session's model
# instead. Kept as its own workflow rather than folded into docs-lint.yml
# because its trigger path (.claude/agents/**) is unrelated to docs/.

on:
  pull_request:
    paths:
      - ".claude/agents/worker-*.md"
      - ".github/scripts/check_worker_agent_model.py"
      - ".github/scripts/tests/test_check_worker_agent_model.py"
      - ".github/workflows/worker-agent-model-lint.yml"
  push:
    paths:
      - ".claude/agents/worker-*.md"
      - ".github/scripts/check_worker_agent_model.py"
      - ".github/scripts/tests/test_check_worker_agent_model.py"
      - ".github/workflows/worker-agent-model-lint.yml"

permissions:
  contents: read

jobs:
  lint:
    name: "Lint .claude/agents/worker-*.md for model: sonnet"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run worker agent model lint unit tests
        run: python3 .github/scripts/tests/test_check_worker_agent_model.py
      - name: Run worker agent model lint against the real repo
        run: python3 .github/scripts/check_worker_agent_model.py
