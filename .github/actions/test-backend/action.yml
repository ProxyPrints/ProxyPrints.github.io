name: Backend tests
description: Test the MPC Autofill Django backend
inputs:
  google-drive-api-key:
    description: Your Google Drive API key, required for running the database crawler
    required: true
  moxfield-secret:
    description: Your Moxfield API secret, required for pulling data from Moxfield
    required: true
runs:
  using: composite
  steps:
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: 3.13
    - name: Install tesseract-ocr
      # CI baseline cleanup, 2026-07-19: OCR-touching backend tests were failing with
      # pytesseract.TesseractNotFoundError - the runner never had the binary, only Python deps.
      # Matches docker/django/Dockerfile's own `tesseract-ocr tesseract-ocr-eng` install so CI
      # actually exercises real tesseract the same way production does, instead of silently
      # needing every OCR-touching test to be mocked or skipped.
      run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-eng
      shell: bash
    - name: Install Python dependencies
      working-directory: MPCAutofill
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      shell: bash
    - name: Write Google Drive API credentials to file
      uses: jsdaniell/create-json@v1.2.3
      with:
        name: "client_secrets.json"
        json: ${{ inputs.google-drive-api-key }}
        dir: "MPCAutofill/"
    - name: Run backend tests
      run: |
        cd MPCAutofill && pytest .
      shell: bash
      env:
        MOXFIELD_SECRET: ${{ inputs.moxfield-secret }}
