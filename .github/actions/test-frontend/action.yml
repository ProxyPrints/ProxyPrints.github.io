name: Frontend tests
description: >-
  Test the MPC Autofill static frontend. Assumes the calling job runs inside
  the mcr.microsoft.com/playwright container image matching
  frontend/package-lock.json's @playwright/test version - Playwright's
  browsers and OS deps are pre-baked there, so this action never installs
  them itself.
inputs:
  shard_index:
    description: Shard index (1-based)
    required: false
    default: "1"
  shard_total:
    description: Total number of shards
    required: false
    default: "1"
runs:
  using: composite
  steps:
    - name: Install npm
      uses: actions/setup-node@v6
      with:
        node-version: 22.15
        cache: "npm"
        cache-dependency-path: frontend/package-lock.json
    - name: Install packages
      working-directory: frontend
      run: npm ci
      shell: bash
    - name: Compile frontend
      # Playwright's webServer (playwright.config.ts) runs `npm run dev`, not a static-export
      # serve of this build's output - no shard's Playwright run consumes frontend/out. This
      # build only exists as a build-succeeds check, so - same as Jest below - it only needs
      # to run once, on shard 1, not once per shard.
      if: ${{ inputs.shard_index == '1' }}
      working-directory: frontend
      run: npm run build
      shell: bash
    - name: Run Jest tests
      if: ${{ inputs.shard_index == '1' }}
      working-directory: frontend
      run: |
        npm run test
      shell: bash
    - name: Run Playwright tests
      run: |
        npx playwright test --shard=${{ inputs.shard_index }}/${{ inputs.shard_total }}
      working-directory: frontend
      shell: bash
    - name: Upload blob report
      uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: blob-report-${{ inputs.shard_index }}
        path: frontend/blob-report/
        retention-days: 1
