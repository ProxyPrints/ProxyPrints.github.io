# This script configures a multi-container setup to serve MPC Autofill and all
# its dependencies. Simply navigate to the base directory and run
# "docker-compose up" to get started. Optionally, you can pass "-d" to detach
# all containers and their outputs to the background. By default, MPC Autofill
# is served at http://localhost:3000. You can adjust the port by copying .env.dist
# as a new file called .env and changing the value of FRONTEND_PORT.
# Many code templates and inspirations are taken from blog post:
# https://testdriven.io/blog/dockerizing-django-with-postgres-gunicorn-and-nginx/

services:
  # Unicorn serving Django
  django:
    image: mpcautofill_django
    container_name: mpcautofill_django
    build:
      context: ..
      dockerfile: ./docker/django/Dockerfile
      target: webserver
    expose:
      - 8000
    depends_on:
      - postgres
      - elasticsearch
    environment:
      # Do not change these variables
      - DATABASE_HOST=postgres
      - ELASTICSEARCH_HOST=elasticsearch
      - DEBUG=False
      - ALLOWED_HOSTS=django-api,api.proxyprints.ca,localhost
      # These variables may be customised
      - GAME=MTG
      - MOXFIELD_SECRET=
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - CSRF_TRUSTED_ORIGINS=https://api.proxyprints.ca
      - CORS_ALLOWED_ORIGINS=https://proxyprints.github.io,https://proxyprints.ca
      - SITE_NAME=ProxyPrints
      # Discord OAuth (moderation layer, docs/features/moderation.md) - docker/.env alone
      # does NOT inject arbitrary variables into the container; only vars explicitly listed
      # here (via ${...} interpolation) actually reach the process. This block was missing
      # from the moderation layer's original PR, so DISCORD_AUTH_ENABLED silently stayed
      # False even with real credentials set in docker/.env - discovered live, 2026-07-15.
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - SESSION_COOKIE_SAMESITE=${SESSION_COOKIE_SAMESITE}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS}
  worker:
    image: mpcautofill_worker
    container_name: mpcautofill_worker
    build:
      context: ..
      dockerfile: ./docker/django/Dockerfile
      target: worker
    depends_on:
      - postgres
      - elasticsearch
    environment:
      # Do not change these variables
      - DATABASE_HOST=postgres
      - ELASTICSEARCH_HOST=elasticsearch
      - DEBUG=False
      - ALLOWED_HOSTS=django-api,api.proxyprints.ca,localhost
      # These variables may be customised
      - GAME=MTG
      - MOXFIELD_SECRET=
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - CSRF_TRUSTED_ORIGINS=https://api.proxyprints.ca
      - CORS_ALLOWED_ORIGINS=https://proxyprints.github.io,https://proxyprints.ca
      - SITE_NAME=ProxyPrints
      # Discord OAuth (moderation layer, docs/features/moderation.md) - docker/.env alone
      # does NOT inject arbitrary variables into the container; only vars explicitly listed
      # here (via ${...} interpolation) actually reach the process. This block was missing
      # from the moderation layer's original PR, so DISCORD_AUTH_ENABLED silently stayed
      # False even with real credentials set in docker/.env - discovered live, 2026-07-15.
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - SESSION_COOKIE_SAMESITE=${SESSION_COOKIE_SAMESITE}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS}

  # nginx serving the frontend
  nginx:
    image: mpcautofill_nginx
    container_name: mpcautofill_nginx
    build:
      context: ..
      dockerfile: ./docker/nginx/Dockerfile
    depends_on:
      - django
    ports:
      - "80:80" # TODO: support ports other than 80
      - "443:443"
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro

  postgres:
    extends:
      file: docker-compose.yml
      service: postgres
    expose:
      - 5432
    ports: []
  elasticsearch:
    extends:
      file: docker-compose.yml
      service: elasticsearch
    expose:
      - 5432
    ports: []
    environment:
      - discovery.type=single-node
      - logger.level=WARN

# Persistent storage for containers
volumes:
  postgres_data:
  elasticsearch_data:
