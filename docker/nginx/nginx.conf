upstream django-api {
    server django:8000;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    root /usr/share/nginx/html;
    index index.html;
    # nginx's proxy_pass default for the Host header is $proxy_host (the upstream's own
    # name, "django-api" here) - NOT the original client's Host, contrary to popular belief.
    # Harmless for endpoints that only return relative JSON, but django-allauth's OAuth flow
    # constructs an *absolute* redirect_uri from request.get_host()/request.is_secure(), so
    # without these it silently builds `http://django-api/accounts/discord/login/callback/`
    # - an internal-only hostname Discord's registered redirect_uri can never match. Applies
    # to every location below via server-block inheritance. Found live during the first
    # production OAuth setup attempt, 2026-07-15 - paired with SECURE_PROXY_SSL_HEADER in
    # settings.py, which is what makes Django actually trust X-Forwarded-Proto here.
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    location /2/ {
        proxy_pass http://django-api;
    }
    location /3/ {
        proxy_pass http://django-api;
    }
    location /admin/ {
        proxy_pass http://django-api;
    }
    location /static/ {
        proxy_pass http://django-api;
    }
    # django-allauth (Discord moderator login - see docs/features/moderation.md). Missing
    # from the moderation layer's original PR - every /accounts/* URL (login, callback,
    # logout) silently fell through to nginx's static-file location block and 404'd, even
    # with DISCORD_AUTH_ENABLED=True server-side. Found live during the first production
    # OAuth setup attempt, 2026-07-15.
    location /accounts/ {
        proxy_pass http://django-api;
    }
    location / {
        # remove .html extension. retrieved from https://stackoverflow.com/a/38238001
        if ($request_uri ~ ^/(.*)\.html(\?|$)) {
            return 302 /$1;
        }
        try_files $uri $uri.html $uri/ =404;
    }
}
