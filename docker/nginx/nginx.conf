upstream django-api {
    server django:8000;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    root /usr/share/nginx/html;
    index index.html;
    location /2/ {
        proxy_pass http://django-api;
    }
    location /3/ {
        proxy_pass http://django-api;
    }
    location /admin/ {
        proxy_pass http://django-api;
    }
    location /static/ {
        proxy_pass http://django-api;
    }
    # django-allauth (Discord moderator login - see docs/features/moderation.md). Missing
    # from the moderation layer's original PR - every /accounts/* URL (login, callback,
    # logout) silently fell through to nginx's static-file location block and 404'd, even
    # with DISCORD_AUTH_ENABLED=True server-side. Found live during the first production
    # OAuth setup attempt, 2026-07-15.
    location /accounts/ {
        proxy_pass http://django-api;
    }
    location / {
        # remove .html extension. retrieved from https://stackoverflow.com/a/38238001
        if ($request_uri ~ ^/(.*)\.html(\?|$)) {
            return 302 /$1;
        }
        try_files $uri $uri.html $uri/ =404;
    }
}
